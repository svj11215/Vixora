name: vixora
description: "Vixora — Real-time apartment visitor management system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  http: ^1.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  cached_network_image: ^3.4.0
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  dart_jsonwebtoken: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/service_account.json
